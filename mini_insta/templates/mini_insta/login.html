{% extends 'mini_insta/base.html' %}

{% block content %}
<h2>Log In</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="next" value="{{ next|default:'/mini_insta/' }}">
    <button type="submit">Log In</button>
</form>
{% if form.errors %}
<p>Invalid username or password.</p>
{% endif %}
{% endblock %}
