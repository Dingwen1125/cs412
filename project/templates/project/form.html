{% extends 'project/base.html' %}

{% block content %}
<h2>{{ page_title }}</h2>
{% if form_note %}
<p>{{ form_note }}</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">{{ submit_label }}</button>
</form>
{% endblock %}
